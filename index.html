<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap"></noscript>
<title>NewGen Dynamic Loader</title>
<style>
  :root {
    --bg: #0b0f17;
    --surface: #101726;
    --surface-2: #0f1d31;
    --text: #e7edf9;
    --muted: #8da0bd;
    --accent: #4da3ff;
    --accent-2: #f0b848;
    --border: #20314f;
    --mono: "IBM Plex Mono", "Cascadia Mono", monospace;
    --sans: "Segoe UI", "Inter", sans-serif;
    --topbar-height: 58px;
    --sidebar-width: 280px;
    --sidebar-width-collapsed: 52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: radial-gradient(circle at 10% 10%, #16223a 0%, #0b0f17 45%, #070b12 100%);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: var(--sidebar-width-collapsed) 1fr;
    grid-template-rows: var(--topbar-height) 1fr;
    transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body.sidebar-expanded {
    grid-template-columns: var(--sidebar-width) 1fr;
  }

  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 16, 28, 0.88);
    backdrop-filter: blur(8px);
  }

  .brand {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .brand strong {
    color: var(--accent-2);
    font-weight: 600;
  }

  .menu-toggle {
    display: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 12px;
    cursor: pointer;
    transition: border-color 0.2s ease;
  }

  .menu-toggle:hover {
    border-color: var(--accent);
  }

  .sidebar {
    background: rgba(10, 16, 28, 0.88);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    width: var(--sidebar-width-collapsed);
  }

  body.sidebar-expanded .sidebar {
    width: var(--sidebar-width);
  }

  /* Hide navigation content when collapsed */
  .sidebar #nav-content {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }

  body.sidebar-expanded .sidebar #nav-content {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transition: opacity 0.35s ease 0.1s, visibility 0s linear;
  }

  .nav-category {
    margin-bottom: 12px;
  }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .cat-header:hover {
    color: var(--text);
    background: rgba(77, 163, 255, 0.05);
  }

  .cat-header.active {
    color: var(--accent-2);
  }

  .cat-icon {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 8px;
  }

  .cat-header.active .cat-icon {
    transform: rotate(90deg);
  }

  .cat-items {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .cat-items.open {
    max-height: 1000px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px 9px 32px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    background: none;
    border: none;
    border-left: 2px solid transparent;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover {
    background: rgba(77, 163, 255, 0.08);
    border-left-color: var(--accent);
    color: #ffffff;
    transform: translateX(2px);
  }

  .nav-item.active {
    background: rgba(77, 163, 255, 0.15);
    border-left-color: var(--accent);
    color: #ffffff;
  }

  .nav-item-icon {
    font-size: 14px;
    opacity: 0.8;
    transition: opacity 0.2s ease;
  }

  .nav-item:hover .nav-item-icon {
    opacity: 1;
  }

  /* Sub-category header */
  .sub-cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 18px 8px 32px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .sub-cat-header:hover {
    color: var(--text);
    background: rgba(77, 163, 255, 0.05);
  }

  .sub-cat-header.active {
    color: var(--accent);
  }

  .sub-cat-icon {
    font-size: 7px;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .sub-cat-header.active .sub-cat-icon {
    transform: rotate(90deg);
  }

  .sub-cat-items {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .sub-cat-items.open {
    max-height: 2000px;
  }

  /* Nested nav items (third level) */
  .nav-item.nested {
    padding-left: 46px;
    font-size: 10px;
  }

  .nav-item.nested:hover {
    background: rgba(77, 163, 255, 0.06);
    transform: translateX(2px);
  }

  .product-group {
    margin: 2px 0;
  }

  .product-row {
    display: flex;
    align-items: stretch;
  }

  .nav-item.product-main {
    flex: 1;
  }

  .product-toggle {
    width: 34px;
    border: none;
    border-left: 1px solid rgba(255, 255, 255, 0.06);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 8px;
    font-family: var(--mono);
  }

  .product-toggle:hover {
    color: var(--text);
    background: rgba(77, 163, 255, 0.08);
  }

  .product-toggle.active {
    color: var(--accent);
  }

  .product-toggle.active .product-toggle-icon {
    display: inline-block;
    transform: rotate(90deg);
  }

  .product-toggle-icon {
    display: inline-block;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .product-subcats {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .product-subcats.open {
    max-height: 2000px;
  }

  /* Collapsed sidebar page indicator */
  .collapsed-indicator {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 24px;
    gap: 16px;
    opacity: 1;
    pointer-events: none;
    transition: opacity 0.2s ease;
    overflow: hidden;
  }

  body.sidebar-expanded .collapsed-indicator {
    opacity: 0;
  }

  .collapsed-page-icon {
    font-size: 26px;
    line-height: 1;
    filter: drop-shadow(0 0 6px rgba(77, 163, 255, 0.4));
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .collapsed-indicator:hover .collapsed-page-icon {
    transform: scale(1.15);
  }

  .collapsed-page-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    white-space: nowrap;
    max-height: calc(100vh - var(--topbar-height) - 120px);
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.9;
  }

  @media (max-width: 900px) {
    .collapsed-indicator {
      display: none;
    }
  }

  .viewer {
    width: 100%;
    height: calc(100vh - var(--topbar-height));
    border: none;
    background: #ffffff;
  }

  @media (max-width: 900px) {
    body {
      grid-template-columns: 1fr;
    }

    body.sidebar-expanded {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: fixed;
      top: var(--topbar-height);
      left: -100%;
      width: var(--sidebar-width);
      height: calc(100vh - var(--topbar-height));
      z-index: 1000;
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: 1px solid var(--border);
      background: rgba(10, 16, 28, 0.98);
      backdrop-filter: blur(8px);
    }

    .sidebar.open {
      left: 0;
    }

    .menu-toggle {
      display: block;
    }

    /* On mobile, always show navigation content when sidebar is visible */
    .sidebar #nav-content {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
  }

  .watchdog-banner {
    position: fixed;
    left: 0;
    right: 0;
    top: var(--topbar-height);
    z-index: 1000;
    background: linear-gradient(90deg, #6b1111 0%, #b32222 100%);
    border-top: 1px solid #ff8585;
    border-bottom: 1px solid #ff8585;
    color: #fff2f2;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: center;
    display: none;
  }

  .watchdog-banner.show {
    display: block;
  }

  .watchdog-banner strong {
    color: #ffffff;
  }

  @media (max-width: 760px) {
    .topbar { padding: 12px; }
    .brand { font-size: 10px; letter-spacing: 0.1em; }
    .menu-toggle { font-size: 10px; padding: 7px 10px; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><strong>NewGen</strong> dynamic page loader</div>
    <button type="button" class="menu-toggle" id="menu-toggle" aria-controls="sidebar" aria-expanded="false">Menu</button>
  </header>

  <nav class="sidebar" id="sidebar" aria-label="Company Navigation">
    <div class="collapsed-indicator" id="collapsed-indicator" aria-hidden="true">
      <span class="collapsed-page-icon" id="collapsed-page-icon">🔷</span>
      <span class="collapsed-page-name" id="collapsed-page-name">NewGen</span>
    </div>
    <!-- Navigation will be generated dynamically -->
  </nav>

  <div id="watchdog-banner" class="watchdog-banner" role="status" aria-live="assertive"></div>
  <iframe id="page-frame" class="viewer" title="Dynamic Content Viewer"></iframe>

<script>
  function stripBasePath(pathname, basePath) {
    if (!basePath) return pathname;
    if (pathname === basePath) return '/';
    if (pathname.startsWith(`${basePath}/`)) {
      return pathname.slice(basePath.length) || '/';
    }
    return pathname;
  }

  function withBasePath(pathname, basePath) {
    if (!basePath) return pathname;
    if (pathname === '/') return `${basePath}/`;
    return `${basePath}${pathname}`;
  }

  // Page registry — add new routes here to extend the system.
  const PAGES = [
    // Main brochure pages
    { path: '/Intel/Eventide', src: '/Source/INTEL/Eventide/intel.eventide.brochure.html' },
    { path: '/Sony/ILCE-0',    src: '/Source/SONY/ILCE-0/sony.a0.brochure.html' },
    { path: '/Sony/XCD-LED',   src: '/Source/SONY/XCD-LED/sony,XCDLED.brochure.html' },
    { path: '/ASUS/Ceralumenesium', src: '/Source/ASUS/Material/Ceraluminesium/asus.ceraluminesium.brochure.html' },

    // CPU Architecture Deep Dives
    { path: '/Intel/Eventide/CPU/SolarEclipse', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/CPU/SunsetCove', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/CPU/Venusmont', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/CPU/LunarEclipse', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/CPU/Darkmont', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },

    // GPU Architecture Deep Dives
    { path: '/Intel/Eventide/GPU/Elementalist', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/GPU/Druid', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/GPU/2DKanvas', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },

    // Tile Deep Dives
    { path: '/Intel/Eventide/Tile/ZAM', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/HNPU', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/LPNPU', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/GNA', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/BionzXR', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/MFX', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/IPU', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/Klangkerne', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/Display', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/KillerS1', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/IO', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/PSM', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },

    // Technology Deep Dives
    { path: '/Intel/Eventide/Technology/ThreadDirector', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
  ];

  function detectAppBasePath(pathname, routePaths) {
    const normalizedPath = pathname.replace(/\/+$/, '') || '/';
    for (const routePath of routePaths) {
      const markerIndex = normalizedPath.indexOf(routePath);
      if (markerIndex > 0) {
        return normalizedPath.slice(0, markerIndex);
      }
      if (markerIndex === 0) {
        return '';
      }
    }
    const segments = normalizedPath.split('/').filter(Boolean);
    return segments.length ? `/${segments[0]}` : '';
  }

  const frame = document.getElementById('page-frame');
  const sidebar = document.getElementById('sidebar');
  const menuToggle = document.getElementById('menu-toggle');
  const SIDEBAR_COLLAPSE_DELAY_MS = 120;
  let sidebarFocusCollapseTimer = null;
  const APP_BASE_PATH = detectAppBasePath(window.location.pathname, PAGES.map((page) => page.path));
  const autoExpandedState = {
    companies: new Set(),
    products: new Set(),
    subCategories: new Set(),
  };

  // Icon mapping for companies, categories, and subcategories
  const ICONS = {
    companies: {
      'Intel': '🔷',
      'Sony': '📷',
      'ASUS': '💎'
    },
    categories: {
      'CPU Architectures': '🖥️',
      'GPU Architectures': '🎨',
      'Tiles': '🧩',
      'Technologies': '⚡'
    },
    pages: {
      'Eventide': '📘',
      'Alpha 0 (a0)': '📸',
      'XCD-LED': '🎥',
      'Ceralumenesium Sapphire': '💠',
      // CPU Architecture icons
      'Solar Eclipse': '☀️',
      'Sunset Cove': '🌅',
      'Venusmont': '🌋',
      'Lunar Eclipse': '🌑',
      'Darkmont': '🌙',
      // GPU Architecture icons
      'Elementalist': '✨',
      'Druid': '🌿',
      '2D Kanvas': '🎭',
      // Tile icons
      'ZAM': '🧠',
      'HNPU': '🎯',
      'LPNPU': '💡',
      'GNA': '🔊',
      'BionzXR': '📹',
      'MFX': '🎬',
      'IPU': '🖼️',
      'Klangkerne': '🎵',
      'Display': '🖥️',
      'KillerS1': '📡',
      'IO': '🔌',
      'PSM': '🔋',
      // Technology icons
      'Thread Director': '🎛️'
    }
  };

  // Build navigation structure from PAGES with nested categories
  const NAV_STRUCTURE = {
    'Intel': [
      {
        label: 'Eventide',
        path: '/Intel/Eventide',
        subCategories: {
          'CPU Architectures': [
            { label: 'Solar Eclipse', path: '/Intel/Eventide/CPU/SolarEclipse' },
            { label: 'Sunset Cove', path: '/Intel/Eventide/CPU/SunsetCove' },
            { label: 'Venusmont', path: '/Intel/Eventide/CPU/Venusmont' },
            { label: 'Lunar Eclipse', path: '/Intel/Eventide/CPU/LunarEclipse' },
            { label: 'Darkmont', path: '/Intel/Eventide/CPU/Darkmont' }
          ],
          'GPU Architectures': [
            { label: 'Elementalist', path: '/Intel/Eventide/GPU/Elementalist' },
            { label: 'Druid', path: '/Intel/Eventide/GPU/Druid' },
            { label: '2D Kanvas', path: '/Intel/Eventide/GPU/2DKanvas' }
          ],
          'Tiles': [
            { label: 'ZAM', path: '/Intel/Eventide/Tile/ZAM' },
            { label: 'HNPU', path: '/Intel/Eventide/Tile/HNPU' },
            { label: 'LPNPU', path: '/Intel/Eventide/Tile/LPNPU' },
            { label: 'GNA', path: '/Intel/Eventide/Tile/GNA' },
            { label: 'BionzXR', path: '/Intel/Eventide/Tile/BionzXR' },
            { label: 'MFX', path: '/Intel/Eventide/Tile/MFX' },
            { label: 'IPU', path: '/Intel/Eventide/Tile/IPU' },
            { label: 'Klangkerne', path: '/Intel/Eventide/Tile/Klangkerne' },
            { label: 'Display', path: '/Intel/Eventide/Tile/Display' },
            { label: 'KillerS1', path: '/Intel/Eventide/Tile/KillerS1' },
            { label: 'IO', path: '/Intel/Eventide/Tile/IO' },
            { label: 'PSM', path: '/Intel/Eventide/Tile/PSM' }
          ],
          'Technologies': [
            { label: 'Thread Director', path: '/Intel/Eventide/Technology/ThreadDirector' }
          ]
        }
      }
    ],
    'Sony': [
      { label: 'Alpha 0 (a0)', path: '/Sony/ILCE-0' },
      { label: 'XCD-LED', path: '/Sony/XCD-LED' }
    ],
    'ASUS': [
      { label: 'Ceralumenesium Sapphire', path: '/ASUS/Ceralumenesium' }
    ]
  };

  // Build sidebar navigation
  function buildNavigation() {
    let html = '';
    for (const [company, items] of Object.entries(NAV_STRUCTURE)) {
      const companyIcon = ICONS.companies[company] || '📁';
      html += `
        <div class="nav-category">
          <button class="cat-header" data-company="${company}" aria-expanded="false">
            <span><span class="nav-item-icon">${companyIcon}</span> ${company}</span>
            <span class="cat-icon">▶</span>
          </button>
          <div class="cat-items">
            ${items.map(item => {
              const pageIcon = ICONS.pages[item.label] || '📄';
              let itemHtml = `<button class="nav-item" data-path="${item.path}"><span class="nav-item-icon">${pageIcon}</span> ${item.label}</button>`;

              // Add subcategories if they exist
              if (item.subCategories) {
                let subCategoriesHtml = '';
                for (const [subCatName, subItems] of Object.entries(item.subCategories)) {
                  const categoryIcon = ICONS.categories[subCatName] || '📂';
                  subCategoriesHtml += `
                    <div class="sub-category">
                      <button class="sub-cat-header" data-product-path="${item.path}" data-subcat="${subCatName}" aria-expanded="false">
                        <span><span class="nav-item-icon">${categoryIcon}</span> ${subCatName}</span>
                        <span class="sub-cat-icon">▶</span>
                      </button>
                      <div class="sub-cat-items">
                        ${subItems.map(subItem => {
                          const subIcon = ICONS.pages[subItem.label] || '•';
                          return `<button class="nav-item nested" data-path="${subItem.path}"><span class="nav-item-icon">${subIcon}</span> ${subItem.label}</button>`;
                        }).join('')}
                      </div>
                    </div>
                  `;
                }
                itemHtml = `
                  <div class="product-group" data-product-path="${item.path}">
                    <div class="product-row">
                      <button class="nav-item product-main" data-path="${item.path}"><span class="nav-item-icon">${pageIcon}</span> ${item.label}</button>
                      <button class="product-toggle" data-product-path="${item.path}" aria-expanded="false" aria-label="Toggle ${item.label} subcategories">
                        <span class="product-toggle-icon">▶</span>
                      </button>
                    </div>
                    <div class="product-subcats">
                      ${subCategoriesHtml}
                    </div>
                  </div>
                `;
              }
              return itemHtml;
            }).join('')}
          </div>
        </div>
      `;
    }

    // Inject into #nav-content to preserve the .collapsed-indicator element
    let navContent = sidebar.querySelector('#nav-content');
    if (!navContent) {
      navContent = document.createElement('div');
      navContent.id = 'nav-content';
      sidebar.appendChild(navContent);
    }
    navContent.innerHTML = html;

    // Add event listeners for company headers
    document.querySelectorAll('.cat-header').forEach(header => {
      header.addEventListener('click', () => {
        autoExpandedState.companies.delete(header.dataset.company);
        header.classList.toggle('active');
        const items = header.nextElementSibling;
        items.classList.toggle('open');
        header.setAttribute('aria-expanded', items.classList.contains('open') ? 'true' : 'false');
      });
    });

    // Add event listeners for product toggles
    document.querySelectorAll('.product-toggle').forEach(toggle => {
      toggle.addEventListener('click', () => {
        const productPath = toggle.dataset.productPath;
        autoExpandedState.products.delete(productPath);
        const productSubcats = toggle.closest('.product-group')?.querySelector('.product-subcats');
        if (!productSubcats) return;
        productSubcats.classList.toggle('open');
        toggle.classList.toggle('active', productSubcats.classList.contains('open'));
        toggle.setAttribute('aria-expanded', productSubcats.classList.contains('open') ? 'true' : 'false');
      });
    });

    // Add event listeners for sub-category headers
    document.querySelectorAll('.sub-cat-header').forEach(header => {
      header.addEventListener('click', () => {
        const subKey = createSubCategoryKey(header.dataset.productPath, header.dataset.subcat);
        autoExpandedState.subCategories.delete(subKey);
        header.classList.toggle('active');
        const items = header.nextElementSibling;
        items.classList.toggle('open');
        header.setAttribute('aria-expanded', items.classList.contains('open') ? 'true' : 'false');
      });
    });

    // Add event listeners for navigation items
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const page = findPage(btn.dataset.path);
        if (page.path !== stripBasePath(window.location.pathname, APP_BASE_PATH)) {
          navigate(page, true, { source: 'sidebar' });
        }
        // Close mobile menu
        if (window.innerWidth <= 900) {
          sidebar.classList.remove('open');
          menuToggle.setAttribute('aria-expanded', 'false');
        }
      });
    });
  }

  // Sidebar hover-based expand/collapse
  sidebar.addEventListener('mouseenter', () => {
    document.body.classList.add('sidebar-expanded');
  });

  sidebar.addEventListener('mouseleave', () => {
    document.body.classList.remove('sidebar-expanded');
  });

  sidebar.addEventListener('focusin', () => {
    if (sidebarFocusCollapseTimer) {
      window.clearTimeout(sidebarFocusCollapseTimer);
      sidebarFocusCollapseTimer = null;
    }
    if (window.innerWidth > 900) {
      document.body.classList.add('sidebar-expanded');
    }
  });

  sidebar.addEventListener('focusout', (event) => {
    if (window.innerWidth <= 900) return;
    const nextFocused = event.relatedTarget;
    if (!nextFocused || !sidebar.contains(nextFocused)) {
      if (sidebarFocusCollapseTimer) {
        window.clearTimeout(sidebarFocusCollapseTimer);
      }
      sidebarFocusCollapseTimer = window.setTimeout(() => {
        document.body.classList.remove('sidebar-expanded');
        sidebarFocusCollapseTimer = null;
      }, SIDEBAR_COLLAPSE_DELAY_MS);
    }
  });

  // Mobile menu toggle
  menuToggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    menuToggle.setAttribute('aria-expanded', sidebar.classList.contains('open') ? 'true' : 'false');
  });

  // Initialize navigation
  buildNavigation();

  const HEARTBEAT_INTERVAL_MS = 2000;
  const HEARTBEAT_FAILURE_THRESHOLD_COUNT = 2;
  const PING_INTERVAL_MS = 3000;
  const REQUEST_TIMEOUT_MS = 2000;
  const MAX_WATCHDOG_INIT_RETRY_MS = 30000;
  const CLIENT_CLOSE_COUNTDOWN_S = 3;
  const CLOSE_TAB_HEADER_VALUE = '1';
  let launcherWatchdog = false;
  let watchdogInitialized = false;
  let watchdogInitInProgress = false;
  let watchdogInitRetryDelayMs = HEARTBEAT_INTERVAL_MS;
  let heartbeatTimer = null;
  let pingTimer = null;
  let consecutiveHeartbeatFailures = 0;
  let clientCloseCountdownTimer = null;
  let clientCloseCountdownInterval = null;
  let clientCloseCountdownReason = '';
  let clientCloseCountdownRemaining = 0;
  const scrollPositions = {};
  const watchdogBanner = document.getElementById('watchdog-banner');
  const collapsedPageIcon = document.getElementById('collapsed-page-icon');
  const collapsedPageName = document.getElementById('collapsed-page-name');

  // Build a flat lookup of path → { label, icon } from NAV_STRUCTURE for the collapsed indicator
  function buildPageLookup() {
    const lookup = {};
    for (const [company, items] of Object.entries(NAV_STRUCTURE)) {
      const companyIcon = ICONS.companies[company] || '📁';
      for (const item of items) {
        lookup[item.path] = { label: item.label, icon: ICONS.pages[item.label] || companyIcon };
        if (item.subCategories) {
          for (const subItems of Object.values(item.subCategories)) {
            for (const subItem of subItems) {
              lookup[subItem.path] = { label: subItem.label, icon: ICONS.pages[subItem.label] || '📄' };
            }
          }
        }
      }
    }
    return lookup;
  }
  const PAGE_LOOKUP = buildPageLookup();

  function updateCollapsedIndicator(page) {
    if (!collapsedPageIcon || !collapsedPageName) return;
    const info = PAGE_LOOKUP[page.path];
    if (info) {
      collapsedPageIcon.textContent = info.icon;
      collapsedPageName.textContent = info.label;
    }
  }

  function findPage(pathname) {
    return PAGES.find((p) => p.path === pathname) || PAGES[0];
  }

  function isKnownPagePath(pathname) {
    return PAGES.some((p) => p.path === pathname);
  }

  function createSubCategoryKey(productPath, subcat) {
    return `${productPath || ''}::${subcat || ''}`;
  }

  function getNavItemByPath(pathname) {
    return [...document.querySelectorAll('.nav-item')].find((btn) => btn.dataset.path === pathname) || null;
  }

  function getProductToggleByPath(productPath) {
    return [...document.querySelectorAll('.product-toggle')].find((btn) => btn.dataset.productPath === productPath) || null;
  }

  function openCompanySection(companyItems, shouldTrackAuto) {
    if (!companyItems) return;
    const companyHeader = companyItems.previousElementSibling;
    if (!companyHeader || !companyHeader.classList.contains('cat-header')) return;
    const wasOpen = companyItems.classList.contains('open');
    companyItems.classList.add('open');
    companyHeader.classList.add('active');
    companyHeader.setAttribute('aria-expanded', 'true');
    const companyKey = companyHeader.dataset.company;
    if (!companyKey) return;
    if (!wasOpen && shouldTrackAuto) autoExpandedState.companies.add(companyKey);
    if (!shouldTrackAuto) autoExpandedState.companies.delete(companyKey);
  }

  function openProductSection(activeButton, shouldTrackAuto) {
    const productGroup = activeButton.closest('.product-group');
    if (!productGroup) return;
    const productPath = productGroup.dataset.productPath;
    if (!productPath) return;
    const productSubcats = productGroup.querySelector('.product-subcats');
    const productToggle = productGroup.querySelector('.product-toggle');
    if (!productSubcats || !productToggle) return;
    const wasOpen = productSubcats.classList.contains('open');
    productSubcats.classList.add('open');
    productToggle.classList.add('active');
    productToggle.setAttribute('aria-expanded', 'true');
    if (!wasOpen && shouldTrackAuto) autoExpandedState.products.add(productPath);
    if (!shouldTrackAuto) autoExpandedState.products.delete(productPath);
  }

  function openSubCategorySection(activeButton, shouldTrackAuto) {
    const subCategoryItems = activeButton.closest('.sub-cat-items');
    if (!subCategoryItems) return;
    const subCategoryHeader = subCategoryItems.previousElementSibling;
    if (!subCategoryHeader || !subCategoryHeader.classList.contains('sub-cat-header')) return;
    const wasOpen = subCategoryItems.classList.contains('open');
    subCategoryItems.classList.add('open');
    subCategoryHeader.classList.add('active');
    subCategoryHeader.setAttribute('aria-expanded', 'true');
    const subKey = createSubCategoryKey(subCategoryHeader.dataset.productPath, subCategoryHeader.dataset.subcat);
    if (!wasOpen && shouldTrackAuto) autoExpandedState.subCategories.add(subKey);
    if (!shouldTrackAuto) autoExpandedState.subCategories.delete(subKey);
  }

  function collapseAutoExpandedForProduct(productPath) {
    if (!isKnownPagePath(productPath)) return;
    const productButton = getNavItemByPath(productPath);
    const companyItemsForProduct = productButton?.closest('.cat-items') || null;
    const companyHeaderForProduct = companyItemsForProduct?.previousElementSibling || null;
    const companyKey = companyHeaderForProduct?.dataset?.company || '';

    document.querySelectorAll('.sub-cat-header[data-product-path]').forEach((header) => {
      const subKey = createSubCategoryKey(header.dataset.productPath, header.dataset.subcat);
      if (header.dataset.productPath === productPath && autoExpandedState.subCategories.has(subKey)) {
        const items = header.nextElementSibling;
        if (items && items.classList.contains('sub-cat-items')) {
          items.classList.remove('open');
        }
        header.classList.remove('active');
        header.setAttribute('aria-expanded', 'false');
        autoExpandedState.subCategories.delete(subKey);
      }
    });

    const productToggle = getProductToggleByPath(productPath);
    if (productToggle && autoExpandedState.products.has(productPath)) {
      const productSubcats = productToggle.closest('.product-group')?.querySelector('.product-subcats');
      if (productSubcats) {
        productSubcats.classList.remove('open');
      }
      productToggle.classList.remove('active');
      productToggle.setAttribute('aria-expanded', 'false');
      autoExpandedState.products.delete(productPath);
    }

    if (companyKey && companyHeaderForProduct && autoExpandedState.companies.has(companyKey)) {
      if (companyItemsForProduct && companyItemsForProduct.classList.contains('cat-items')) {
        companyItemsForProduct.classList.remove('open');
      }
      companyHeaderForProduct.classList.remove('active');
      companyHeaderForProduct.setAttribute('aria-expanded', 'false');
      autoExpandedState.companies.delete(companyKey);
    }
  }

  function navigate(page, pushState, options = {}) {
    const source = options.source || 'external';
    const shouldTrackAuto = source !== 'sidebar';
    // Save the scroll position of the page we are leaving so we can restore it later.
    const fromPath = stripBasePath(window.location.pathname, APP_BASE_PATH);
    try {
      if (frame.contentWindow) {
        scrollPositions[fromPath] = frame.contentWindow.scrollY || 0;
      }
    } catch (e) { /* cross-origin guard */ }

    if (pushState) {
      history.pushState({ path: page.path }, '', withBasePath(page.path, APP_BASE_PATH));
    }
    frame.src = withBasePath(page.src, APP_BASE_PATH);

    if (source === 'return-to-main') {
      collapseAutoExpandedForProduct(page.path);
    }

    // Update active state and collapsed indicator
    document.querySelectorAll('.nav-item').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.path === page.path);
    });
    const activeButton = [...document.querySelectorAll('.nav-item')].find((btn) => btn.dataset.path === page.path);
    if (activeButton) {
      const companyItems = activeButton.closest('.cat-items');
      openCompanySection(companyItems, shouldTrackAuto);
      openProductSection(activeButton, shouldTrackAuto);
      openSubCategorySection(activeButton, shouldTrackAuto);
    }
    updateCollapsedIndicator(page);
  }

  // Restore scroll position after the iframe finishes loading.
  frame.addEventListener('load', () => {
    const currentPath = stripBasePath(window.location.pathname, APP_BASE_PATH);
    const savedY = scrollPositions[currentPath];
    if (savedY) {
      try {
        frame.contentWindow.scrollTo(0, savedY);
      } catch (e) { /* cross-origin guard */ }
    }
  });

  // Expose navigation function for iframe content
  window.navigateToPath = function(pathname, options = {}) {
    const page = findPage(pathname);
    navigate(page, true, options);
  };

  async function safeFetch(url, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
    const controller = new AbortController();
    const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
    try {
      const response = await fetch(url, {
        cache: 'no-store',
        ...options,
        signal: controller.signal,
      });
      if (!response.ok && response.status !== 204) {
        throw new Error(`Request failed: ${response.status}`);
      }
      return response;
    } finally {
      window.clearTimeout(timeoutId);
    }
  }

  function stopWatchdogTimers() {
    window.clearInterval(heartbeatTimer);
    window.clearInterval(pingTimer);
  }

  function closeTabFromWatchdog() {
    sendClosedSignal();
    clearClientCloseCountdown();
    stopWatchdogTimers();
    window.close();
  }

  function renderWatchdogBanner() {
    if (!watchdogBanner) return;
    watchdogBanner.textContent = `[WATCHDOG] ${clientCloseCountdownReason}. Closing tab in ${clientCloseCountdownRemaining}s...`;
    watchdogBanner.classList.add('show');
  }

  function clearClientCloseCountdown() {
    if (clientCloseCountdownTimer) {
      window.clearTimeout(clientCloseCountdownTimer);
      clientCloseCountdownTimer = null;
    }
    if (clientCloseCountdownInterval) {
      window.clearInterval(clientCloseCountdownInterval);
      clientCloseCountdownInterval = null;
    }
    clientCloseCountdownReason = '';
    clientCloseCountdownRemaining = 0;
    if (watchdogBanner) {
      watchdogBanner.textContent = '';
      watchdogBanner.classList.remove('show');
    }
  }

  function startClientCloseCountdown(reason, seconds = CLIENT_CLOSE_COUNTDOWN_S) {
    if (clientCloseCountdownTimer) return;
    clientCloseCountdownReason = reason;
    clientCloseCountdownRemaining = seconds;
    console.error(`[WATCHDOG] ${reason}. Closing tab countdown started (${seconds}s).`);
    renderWatchdogBanner();
    console.error(`[WATCHDOG] ${clientCloseCountdownRemaining}s remaining before forced tab close.`);
    clientCloseCountdownInterval = window.setInterval(() => {
      clientCloseCountdownRemaining -= 1;
      if (clientCloseCountdownRemaining <= 0) {
        window.clearInterval(clientCloseCountdownInterval);
        clientCloseCountdownInterval = null;
        return;
      }
      renderWatchdogBanner();
      console.error(`[WATCHDOG] ${clientCloseCountdownRemaining}s remaining before forced tab close.`);
    }, 1000);
    clientCloseCountdownTimer = window.setTimeout(() => {
      closeTabFromWatchdog();
    }, seconds * 1000);
  }

  function sendClosedSignal() {
    const sent = navigator.sendBeacon('/__launcher/closed');
    if (!sent) {
      fetch('/__launcher/closed', { method: 'POST', keepalive: true, cache: 'no-store' })
        .catch((error) => {
          console.warn(`[WATCHDOG] Fallback close signal failed (${error?.message ?? 'unknown'}).`);
        });
    }
  }

  async function setupWatchdog() {
    if (watchdogInitialized || watchdogInitInProgress) return;
    console.log('[WATCHDOG] Initializing launcher watchdog...');
    watchdogInitInProgress = true;
    try {
      const status = await safeFetch('/__launcher/status').then((r) => r.json());
      launcherWatchdog = Boolean(status.watchdog);
      watchdogInitialized = true;
      watchdogInitRetryDelayMs = HEARTBEAT_INTERVAL_MS;
      console.log(`[WATCHDOG] Launcher watchdog status detected: ${launcherWatchdog ? 'enabled' : 'disabled'}.`);
      if (!launcherWatchdog) return;
    } catch (error) {
      const retryDelayMs = watchdogInitRetryDelayMs;
      console.warn(`[WATCHDOG] Status probe failed (${error?.message ?? 'unknown'}). Retrying in ${retryDelayMs}ms.`);
      watchdogInitRetryDelayMs = Math.min(watchdogInitRetryDelayMs * 2, MAX_WATCHDOG_INIT_RETRY_MS);
      window.setTimeout(setupWatchdog, retryDelayMs);
      return;
    } finally {
      watchdogInitInProgress = false;
    }

    console.log(`[WATCHDOG] Heartbeat loop started (${HEARTBEAT_INTERVAL_MS}ms interval).`);
    heartbeatTimer = window.setInterval(() => {
      safeFetch('/__launcher/heartbeat', { method: 'POST', keepalive: true })
        .then(() => {
          if (consecutiveHeartbeatFailures > 0) {
            console.log('[WATCHDOG] Heartbeat recovered after prior failures.');
          }
          clearClientCloseCountdown();
          consecutiveHeartbeatFailures = 0;
        })
        .catch((error) => {
          consecutiveHeartbeatFailures += 1;
          console.warn(`[WATCHDOG] Heartbeat failure ${consecutiveHeartbeatFailures}/${HEARTBEAT_FAILURE_THRESHOLD_COUNT} (${error?.message ?? 'unknown'}).`);
          if (consecutiveHeartbeatFailures >= HEARTBEAT_FAILURE_THRESHOLD_COUNT) {
            startClientCloseCountdown('Server heartbeat is unavailable');
          }
        });
    }, HEARTBEAT_INTERVAL_MS);

    console.log(`[WATCHDOG] Ping loop started (${PING_INTERVAL_MS}ms interval).`);
    pingTimer = window.setInterval(async () => {
      try {
        const pingResponse = await safeFetch('/__launcher/ping');
        if (pingResponse.headers.get('x-newgen-close-tab') === CLOSE_TAB_HEADER_VALUE) {
          startClientCloseCountdown('Launcher initiated shutdown');
        }
      } catch (error) {
        console.error(`[WATCHDOG] Ping failed (${error?.message ?? 'unknown'}).`);
        startClientCloseCountdown('Launcher ping failed');
      }
    }, PING_INTERVAL_MS);

    // Send a close beacon when the tab is truly closed. The server applies a
    // 3-second grace period: if a heartbeat arrives in time (e.g. from a page
    // reload triggered by address-bar navigation) the shutdown is cancelled.
    window.addEventListener('beforeunload', () => {
      sendClosedSignal();
    });
    window.addEventListener('pagehide', () => {
      sendClosedSignal();
    });
  }

  // Load the page that matches the current URL on first visit
  const currentRoutePath = stripBasePath(window.location.pathname, APP_BASE_PATH);
   if (currentRoutePath === '/') {
    const defaultPage = findPage('/Intel/Eventide');
    history.replaceState({ path: defaultPage.path }, '', withBasePath(defaultPage.path, APP_BASE_PATH));
  }
  navigate(findPage(currentRoutePath), false);
  setupWatchdog();

  // Handle browser back / forward
  window.addEventListener('popstate', () => {
    navigate(findPage(stripBasePath(window.location.pathname, APP_BASE_PATH)), false);
  });
</script>
</body>
</html>
