<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewGen Dynamic Loader</title>
<style>
  :root {
    --bg: #0b0f17;
    --surface: #101726;
    --surface-2: #0f1d31;
    --text: #e7edf9;
    --muted: #8da0bd;
    --accent: #4da3ff;
    --accent-2: #f0b848;
    --border: #20314f;
    --mono: "IBM Plex Mono", "Cascadia Mono", monospace;
    --sans: "Segoe UI", "Inter", sans-serif;
    --topbar-height: 58px;
    --sidebar-width: 280px;
    --sidebar-width-collapsed: 52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: radial-gradient(circle at 10% 10%, #16223a 0%, #0b0f17 45%, #070b12 100%);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    grid-template-rows: var(--topbar-height) 1fr;
    transition: grid-template-columns 0.3s ease;
  }

  body.sidebar-collapsed {
    grid-template-columns: var(--sidebar-width-collapsed) 1fr;
  }

  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 16, 28, 0.88);
    backdrop-filter: blur(8px);
  }

  .brand {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .brand strong {
    color: var(--accent-2);
    font-weight: 600;
  }

  .menu-toggle {
    display: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 12px;
    cursor: pointer;
    transition: border-color 0.2s ease;
  }

  .menu-toggle:hover {
    border-color: var(--accent);
  }

  .sidebar {
    background: rgba(10, 16, 28, 0.88);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 0;
    transition: width 0.3s ease;
    position: relative;
  }

  body.sidebar-collapsed .sidebar {
    width: var(--sidebar-width-collapsed);
  }

  .sidebar-toggle {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .sidebar-toggle:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  body.sidebar-collapsed .sidebar-toggle {
    right: 10px;
  }

  body.sidebar-collapsed .nav-category,
  body.sidebar-collapsed .cat-items,
  body.sidebar-collapsed .nav-item {
    display: none;
  }

  body.sidebar-collapsed .cat-header {
    display: none;
  }

  .nav-category {
    margin-bottom: 12px;
  }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    transition: color 0.2s ease;
  }

  .cat-header:hover {
    color: var(--text);
  }

  .cat-header.active {
    color: var(--accent-2);
  }

  .cat-icon {
    transition: transform 0.2s ease;
  }

  .cat-header.active .cat-icon {
    transform: rotate(90deg);
  }

  .cat-items {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .cat-items.open {
    max-height: 1000px;
  }

  .nav-item {
    display: block;
    padding: 9px 18px 9px 32px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: all 0.2s ease;
    cursor: pointer;
    background: none;
    border: none;
    border-left: 2px solid transparent;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover {
    background: rgba(77, 163, 255, 0.08);
    border-left-color: var(--accent);
    color: #ffffff;
  }

  .nav-item.active {
    background: rgba(77, 163, 255, 0.15);
    border-left-color: var(--accent);
    color: #ffffff;
  }

  /* Sub-category header */
  .sub-cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 18px 8px 32px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    transition: color 0.2s ease;
  }

  .sub-cat-header:hover {
    color: var(--text);
  }

  .sub-cat-header.active {
    color: var(--accent);
  }

  .sub-cat-icon {
    font-size: 8px;
    transition: transform 0.2s ease;
  }

  .sub-cat-header.active .sub-cat-icon {
    transform: rotate(90deg);
  }

  .sub-cat-items {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .sub-cat-items.open {
    max-height: 2000px;
  }

  /* Nested nav items (third level) */
  .nav-item.nested {
    padding-left: 46px;
    font-size: 10px;
  }

  .nav-item.nested:hover {
    background: rgba(77, 163, 255, 0.06);
  }

  .viewer {
    width: 100%;
    height: calc(100vh - var(--topbar-height));
    border: none;
    background: #ffffff;
  }

  @media (max-width: 900px) {
    body {
      grid-template-columns: 1fr;
    }

    body.sidebar-collapsed {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: fixed;
      top: var(--topbar-height);
      left: -100%;
      width: var(--sidebar-width);
      height: calc(100vh - var(--topbar-height));
      z-index: 1000;
      transition: left 0.3s ease;
      border-right: 1px solid var(--border);
      background: rgba(10, 16, 28, 0.98);
      backdrop-filter: blur(8px);
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-toggle {
      display: none;
    }

    .menu-toggle {
      display: block;
    }

    body.sidebar-collapsed .nav-category,
    body.sidebar-collapsed .cat-items,
    body.sidebar-collapsed .nav-item,
    body.sidebar-collapsed .cat-header,
    body.sidebar-collapsed .sub-cat-header {
      display: block;
    }
  }

  .watchdog-banner {
    position: fixed;
    left: 0;
    right: 0;
    top: var(--topbar-height);
    z-index: 1000;
    background: linear-gradient(90deg, #6b1111 0%, #b32222 100%);
    border-top: 1px solid #ff8585;
    border-bottom: 1px solid #ff8585;
    color: #fff2f2;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: center;
    display: none;
  }

  .watchdog-banner.show {
    display: block;
  }

  .watchdog-banner strong {
    color: #ffffff;
  }

  @media (max-width: 760px) {
    .topbar { padding: 12px; }
    .brand { font-size: 10px; letter-spacing: 0.1em; }
    .menu-toggle { font-size: 10px; padding: 7px 10px; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><strong>NewGen</strong> dynamic page loader</div>
    <button type="button" class="menu-toggle" id="menu-toggle">Menu</button>
  </header>

  <nav class="sidebar" id="sidebar" aria-label="Company Navigation">
    <button type="button" class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
      <span id="toggle-icon">◀</span>
    </button>
    <!-- Navigation will be generated dynamically -->
  </nav>

  <div id="watchdog-banner" class="watchdog-banner" role="status" aria-live="assertive"></div>
  <iframe id="page-frame" class="viewer" title="Dynamic Content Viewer"></iframe>

<script>
  function stripBasePath(pathname, basePath) {
    if (!basePath) return pathname;
    if (pathname === basePath) return '/';
    if (pathname.startsWith(`${basePath}/`)) {
      return pathname.slice(basePath.length) || '/';
    }
    return pathname;
  }

  function withBasePath(pathname, basePath) {
    if (!basePath) return pathname;
    if (pathname === '/') return `${basePath}/`;
    return `${basePath}${pathname}`;
  }

  // Page registry — add new routes here to extend the system.
  const PAGES = [
    // Main brochure pages
    { path: '/Intel/Eventide', src: '/Source/INTEL/Eventide/intel.eventide.brochure.html' },
    { path: '/Sony/ILCE-0',    src: '/Source/SONY/ILCE-0/sony.a0.brochure.html' },
    { path: '/Sony/XCD-LED',   src: '/Source/SONY/XCD-LED/sony,XCDLED.brochure.html' },
    { path: '/ASUS/Ceralumenesium', src: '/Source/ASUS/Material/Ceraluminesium/asus.ceraluminesium.brochure.html' },

    // CPU Architecture Deep Dives
    { path: '/Intel/Eventide/CPU/SolarEclipse', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/CPU/SunsetCove', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/CPU/Venusmont', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/CPU/UHE', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/CPU/Darkmont', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },

    // GPU Architecture Deep Dives
    { path: '/Intel/Eventide/GPU/Elementalist', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/GPU/Druid', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/GPU/2DKanvas', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },

    // Tile Deep Dives
    { path: '/Intel/Eventide/Tile/ZAM', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/HNPU', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/LPNPU', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/GNA', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/BionzXR', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/MFX', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/IPU', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/Klangkerne', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/Display', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/KillerS1', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/IO', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
    { path: '/Intel/Eventide/Tile/PSM', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },

    // Technology Deep Dives
    { path: '/Intel/Eventide/Technology/ThreadDirector', src: '/Source/INTEL/Eventide/eventide.deepdive.viewer.html' },
  ];

  function detectAppBasePath(pathname, routePaths) {
    const normalizedPath = pathname.replace(/\/+$/, '') || '/';
    for (const routePath of routePaths) {
      const markerIndex = normalizedPath.indexOf(routePath);
      if (markerIndex > 0) {
        return normalizedPath.slice(0, markerIndex);
      }
      if (markerIndex === 0) {
        return '';
      }
    }
    const segments = normalizedPath.split('/').filter(Boolean);
    return segments.length ? `/${segments[0]}` : '';
  }

  const frame = document.getElementById('page-frame');
  const sidebar = document.getElementById('sidebar');
  const menuToggle = document.getElementById('menu-toggle');
  const sidebarToggle = document.getElementById('sidebar-toggle');
  const toggleIcon = document.getElementById('toggle-icon');
  const APP_BASE_PATH = detectAppBasePath(window.location.pathname, PAGES.map((page) => page.path));

  // Build navigation structure from PAGES with nested categories
  const NAV_STRUCTURE = {
    'Intel': [
      {
        label: 'Eventide',
        path: '/Intel/Eventide',
        subCategories: {
          'CPU Architectures': [
            { label: 'Solar Eclipse', path: '/Intel/Eventide/CPU/SolarEclipse' },
            { label: 'Sunset Cove', path: '/Intel/Eventide/CPU/SunsetCove' },
            { label: 'Venusmont', path: '/Intel/Eventide/CPU/Venusmont' },
            { label: 'UHE', path: '/Intel/Eventide/CPU/UHE' },
            { label: 'Darkmont', path: '/Intel/Eventide/CPU/Darkmont' }
          ],
          'GPU Architectures': [
            { label: 'Elementalist', path: '/Intel/Eventide/GPU/Elementalist' },
            { label: 'Druid', path: '/Intel/Eventide/GPU/Druid' },
            { label: '2D Kanvas', path: '/Intel/Eventide/GPU/2DKanvas' }
          ],
          'Tiles': [
            { label: 'ZAM', path: '/Intel/Eventide/Tile/ZAM' },
            { label: 'HNPU', path: '/Intel/Eventide/Tile/HNPU' },
            { label: 'LPNPU', path: '/Intel/Eventide/Tile/LPNPU' },
            { label: 'GNA', path: '/Intel/Eventide/Tile/GNA' },
            { label: 'BionzXR', path: '/Intel/Eventide/Tile/BionzXR' },
            { label: 'MFX', path: '/Intel/Eventide/Tile/MFX' },
            { label: 'IPU', path: '/Intel/Eventide/Tile/IPU' },
            { label: 'Klangkerne', path: '/Intel/Eventide/Tile/Klangkerne' },
            { label: 'Display', path: '/Intel/Eventide/Tile/Display' },
            { label: 'KillerS1', path: '/Intel/Eventide/Tile/KillerS1' },
            { label: 'IO', path: '/Intel/Eventide/Tile/IO' },
            { label: 'PSM', path: '/Intel/Eventide/Tile/PSM' }
          ],
          'Technologies': [
            { label: 'Thread Director', path: '/Intel/Eventide/Technology/ThreadDirector' }
          ]
        }
      }
    ],
    'Sony': [
      { label: 'Alpha 0 (a0)', path: '/Sony/ILCE-0' },
      { label: 'XCD-LED', path: '/Sony/XCD-LED' }
    ],
    'ASUS': [
      { label: 'Ceralumenesium Sapphire', path: '/ASUS/Ceralumenesium' }
    ]
  };

  // Build sidebar navigation
  function buildNavigation() {
    let html = '';
    for (const [company, items] of Object.entries(NAV_STRUCTURE)) {
      html += `
        <div class="nav-category">
          <button class="cat-header" data-company="${company}">
            <span>${company}</span>
            <span class="cat-icon">▶</span>
          </button>
          <div class="cat-items">
            ${items.map(item => {
              let itemHtml = `<button class="nav-item" data-path="${item.path}">${item.label}</button>`;

              // Add subcategories if they exist
              if (item.subCategories) {
                for (const [subCatName, subItems] of Object.entries(item.subCategories)) {
                  itemHtml += `
                    <div class="sub-category">
                      <button class="sub-cat-header" data-subcat="${subCatName}">
                        <span>${subCatName}</span>
                        <span class="sub-cat-icon">▶</span>
                      </button>
                      <div class="sub-cat-items">
                        ${subItems.map(subItem => `
                          <button class="nav-item nested" data-path="${subItem.path}">${subItem.label}</button>
                        `).join('')}
                      </div>
                    </div>
                  `;
                }
              }
              return itemHtml;
            }).join('')}
          </div>
        </div>
      `;
    }
    sidebar.innerHTML = sidebar.querySelector('.sidebar-toggle').outerHTML + html;

    // Add event listeners for company headers
    document.querySelectorAll('.cat-header').forEach(header => {
      header.addEventListener('click', () => {
        header.classList.toggle('active');
        const items = header.nextElementSibling;
        items.classList.toggle('open');
      });
    });

    // Add event listeners for sub-category headers
    document.querySelectorAll('.sub-cat-header').forEach(header => {
      header.addEventListener('click', () => {
        header.classList.toggle('active');
        const items = header.nextElementSibling;
        items.classList.toggle('open');
      });
    });

    // Add event listeners for navigation items
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const page = findPage(btn.dataset.path);
        if (page.path !== stripBasePath(window.location.pathname, APP_BASE_PATH)) {
          navigate(page, true);
        }
        // Close mobile menu
        if (window.innerWidth <= 900) {
          sidebar.classList.remove('open');
        }
      });
    });
  }

  // Sidebar collapse toggle
  sidebarToggle.addEventListener('click', () => {
    document.body.classList.toggle('sidebar-collapsed');
    const isCollapsed = document.body.classList.contains('sidebar-collapsed');
    toggleIcon.textContent = isCollapsed ? '▶' : '◀';
  });

  // Mobile menu toggle
  menuToggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
  });

  // Initialize navigation
  buildNavigation();

  const HEARTBEAT_INTERVAL_MS = 2000;
  const HEARTBEAT_FAILURE_THRESHOLD_COUNT = 2;
  const PING_INTERVAL_MS = 3000;
  const REQUEST_TIMEOUT_MS = 2000;
  const MAX_WATCHDOG_INIT_RETRY_MS = 30000;
  const CLIENT_CLOSE_COUNTDOWN_S = 3;
  const CLOSE_TAB_HEADER_VALUE = '1';
  let launcherWatchdog = false;
  let watchdogInitialized = false;
  let watchdogInitInProgress = false;
  let watchdogInitRetryDelayMs = HEARTBEAT_INTERVAL_MS;
  let heartbeatTimer = null;
  let pingTimer = null;
  let consecutiveHeartbeatFailures = 0;
  let clientCloseCountdownTimer = null;
  let clientCloseCountdownInterval = null;
  let clientCloseCountdownReason = '';
  let clientCloseCountdownRemaining = 0;
  const scrollPositions = {};
  const watchdogBanner = document.getElementById('watchdog-banner');

  function findPage(pathname) {
    return PAGES.find((p) => p.path === pathname) || PAGES[0];
  }

  function navigate(page, pushState) {
    // Save the scroll position of the page we are leaving so we can restore it later.
    const fromPath = stripBasePath(window.location.pathname, APP_BASE_PATH);
    try {
      if (frame.contentWindow) {
        scrollPositions[fromPath] = frame.contentWindow.scrollY || 0;
      }
    } catch (e) { /* cross-origin guard */ }

    if (pushState) {
      history.pushState({ path: page.path }, '', withBasePath(page.path, APP_BASE_PATH));
    }
    frame.src = withBasePath(page.src, APP_BASE_PATH);

    // Update active state
    document.querySelectorAll('.nav-item').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.path === page.path);
    });
  }

  // Restore scroll position after the iframe finishes loading.
  frame.addEventListener('load', () => {
    const currentPath = stripBasePath(window.location.pathname, APP_BASE_PATH);
    const savedY = scrollPositions[currentPath];
    if (savedY) {
      try {
        frame.contentWindow.scrollTo(0, savedY);
      } catch (e) { /* cross-origin guard */ }
    }
  });

  // Expose navigation function for iframe content
  window.navigateToPath = function(pathname) {
    const page = findPage(pathname);
    navigate(page, true);
  };

  async function safeFetch(url, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
    const controller = new AbortController();
    const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
    try {
      const response = await fetch(url, {
        cache: 'no-store',
        ...options,
        signal: controller.signal,
      });
      if (!response.ok && response.status !== 204) {
        throw new Error(`Request failed: ${response.status}`);
      }
      return response;
    } finally {
      window.clearTimeout(timeoutId);
    }
  }

  function stopWatchdogTimers() {
    window.clearInterval(heartbeatTimer);
    window.clearInterval(pingTimer);
  }

  function closeTabFromWatchdog() {
    sendClosedSignal();
    clearClientCloseCountdown();
    stopWatchdogTimers();
    window.close();
  }

  function renderWatchdogBanner() {
    if (!watchdogBanner) return;
    watchdogBanner.textContent = `[WATCHDOG] ${clientCloseCountdownReason}. Closing tab in ${clientCloseCountdownRemaining}s...`;
    watchdogBanner.classList.add('show');
  }

  function clearClientCloseCountdown() {
    if (clientCloseCountdownTimer) {
      window.clearTimeout(clientCloseCountdownTimer);
      clientCloseCountdownTimer = null;
    }
    if (clientCloseCountdownInterval) {
      window.clearInterval(clientCloseCountdownInterval);
      clientCloseCountdownInterval = null;
    }
    clientCloseCountdownReason = '';
    clientCloseCountdownRemaining = 0;
    if (watchdogBanner) {
      watchdogBanner.textContent = '';
      watchdogBanner.classList.remove('show');
    }
  }

  function startClientCloseCountdown(reason, seconds = CLIENT_CLOSE_COUNTDOWN_S) {
    if (clientCloseCountdownTimer) return;
    clientCloseCountdownReason = reason;
    clientCloseCountdownRemaining = seconds;
    console.error(`[WATCHDOG] ${reason}. Closing tab countdown started (${seconds}s).`);
    renderWatchdogBanner();
    console.error(`[WATCHDOG] ${clientCloseCountdownRemaining}s remaining before forced tab close.`);
    clientCloseCountdownInterval = window.setInterval(() => {
      clientCloseCountdownRemaining -= 1;
      if (clientCloseCountdownRemaining <= 0) {
        window.clearInterval(clientCloseCountdownInterval);
        clientCloseCountdownInterval = null;
        return;
      }
      renderWatchdogBanner();
      console.error(`[WATCHDOG] ${clientCloseCountdownRemaining}s remaining before forced tab close.`);
    }, 1000);
    clientCloseCountdownTimer = window.setTimeout(() => {
      closeTabFromWatchdog();
    }, seconds * 1000);
  }

  function sendClosedSignal() {
    const sent = navigator.sendBeacon('/__launcher/closed');
    if (!sent) {
      fetch('/__launcher/closed', { method: 'POST', keepalive: true, cache: 'no-store' })
        .catch((error) => {
          console.warn(`[WATCHDOG] Fallback close signal failed (${error?.message ?? 'unknown'}).`);
        });
    }
  }

  async function setupWatchdog() {
    if (watchdogInitialized || watchdogInitInProgress) return;
    console.log('[WATCHDOG] Initializing launcher watchdog...');
    watchdogInitInProgress = true;
    try {
      const status = await safeFetch('/__launcher/status').then((r) => r.json());
      launcherWatchdog = Boolean(status.watchdog);
      watchdogInitialized = true;
      watchdogInitRetryDelayMs = HEARTBEAT_INTERVAL_MS;
      console.log(`[WATCHDOG] Launcher watchdog status detected: ${launcherWatchdog ? 'enabled' : 'disabled'}.`);
      if (!launcherWatchdog) return;
    } catch (error) {
      const retryDelayMs = watchdogInitRetryDelayMs;
      console.warn(`[WATCHDOG] Status probe failed (${error?.message ?? 'unknown'}). Retrying in ${retryDelayMs}ms.`);
      watchdogInitRetryDelayMs = Math.min(watchdogInitRetryDelayMs * 2, MAX_WATCHDOG_INIT_RETRY_MS);
      window.setTimeout(setupWatchdog, retryDelayMs);
      return;
    } finally {
      watchdogInitInProgress = false;
    }

    console.log(`[WATCHDOG] Heartbeat loop started (${HEARTBEAT_INTERVAL_MS}ms interval).`);
    heartbeatTimer = window.setInterval(() => {
      safeFetch('/__launcher/heartbeat', { method: 'POST', keepalive: true })
        .then(() => {
          if (consecutiveHeartbeatFailures > 0) {
            console.log('[WATCHDOG] Heartbeat recovered after prior failures.');
          }
          clearClientCloseCountdown();
          consecutiveHeartbeatFailures = 0;
        })
        .catch((error) => {
          consecutiveHeartbeatFailures += 1;
          console.warn(`[WATCHDOG] Heartbeat failure ${consecutiveHeartbeatFailures}/${HEARTBEAT_FAILURE_THRESHOLD_COUNT} (${error?.message ?? 'unknown'}).`);
          if (consecutiveHeartbeatFailures >= HEARTBEAT_FAILURE_THRESHOLD_COUNT) {
            startClientCloseCountdown('Server heartbeat is unavailable');
          }
        });
    }, HEARTBEAT_INTERVAL_MS);

    console.log(`[WATCHDOG] Ping loop started (${PING_INTERVAL_MS}ms interval).`);
    pingTimer = window.setInterval(async () => {
      try {
        const pingResponse = await safeFetch('/__launcher/ping');
        if (pingResponse.headers.get('x-newgen-close-tab') === CLOSE_TAB_HEADER_VALUE) {
          startClientCloseCountdown('Launcher initiated shutdown');
        }
      } catch (error) {
        console.error(`[WATCHDOG] Ping failed (${error?.message ?? 'unknown'}).`);
        startClientCloseCountdown('Launcher ping failed');
      }
    }, PING_INTERVAL_MS);

    // Send a close beacon when the tab is truly closed. The server applies a
    // 3-second grace period: if a heartbeat arrives in time (e.g. from a page
    // reload triggered by address-bar navigation) the shutdown is cancelled.
    window.addEventListener('beforeunload', () => {
      sendClosedSignal();
    });
    window.addEventListener('pagehide', () => {
      sendClosedSignal();
    });
  }

  // Load the page that matches the current URL on first visit
  const currentRoutePath = stripBasePath(window.location.pathname, APP_BASE_PATH);
   if (currentRoutePath === '/') {
    const defaultPage = findPage('/Intel/Eventide');
    history.replaceState({ path: defaultPage.path }, '', withBasePath(defaultPage.path, APP_BASE_PATH));
  }
  navigate(findPage(currentRoutePath), false);
  setupWatchdog();

  // Handle browser back / forward
  window.addEventListener('popstate', () => {
    navigate(findPage(stripBasePath(window.location.pathname, APP_BASE_PATH)), false);
  });
</script>
</body>
