<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewGen Dynamic Loader</title>
<style>
  :root {
    --bg: #0b0f17;
    --surface: #101726;
    --surface-2: #0f1d31;
    --text: #e7edf9;
    --muted: #8da0bd;
    --accent: #4da3ff;
    --accent-2: #f0b848;
    --border: #20314f;
    --mono: "IBM Plex Mono", "Cascadia Mono", monospace;
    --sans: "Segoe UI", "Inter", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: radial-gradient(circle at 10% 10%, #16223a 0%, #0b0f17 45%, #070b12 100%);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 16, 28, 0.88);
    backdrop-filter: blur(8px);
  }

  .brand {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .brand strong {
    color: var(--accent-2);
    font-weight: 600;
  }

  .nav {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .nav button {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 12px;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
  }

  .nav button:hover {
    border-color: var(--accent);
    color: #ffffff;
  }

  .nav button.active {
    border-color: var(--accent);
    background: var(--surface-2);
    color: #ffffff;
  }

  .viewer {
    width: 100%;
    height: calc(100vh - 58px);
    border: none;
    background: #ffffff;
  }

  @media (max-width: 760px) {
    .topbar { padding: 12px; }
    .brand { font-size: 10px; letter-spacing: 0.1em; }
    .nav button { font-size: 10px; padding: 7px 10px; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><strong>NewGen</strong> dynamic page loader</div>
    <nav class="nav" aria-label="Page Navigation">
      <button type="button" data-path="/Intel/Eventide">Intel Eventide</button>
      <button type="button" data-path="/Sony/ILCE-0">Sony a0</button>
      <button type="button" data-path="/Sony/XCD-LED">Sony XCD-LED</button>
    </nav>
  </header>

  <iframe id="page-frame" class="viewer" title="Dynamic Content Viewer"></iframe>

<script>
  // Page registry — add new routes here to extend the system.
  const PAGES = [
    { path: '/Intel/Eventide', src: '/Source/INTEL/Eventide/intel.eventide.brochure.html' },
    { path: '/Sony/ILCE-0',    src: '/Source/SONY/ILCE-0/sony.a0.brochure.html' },
    { path: '/Sony/XCD-LED',   src: '/Source/SONY/XCD-LED/sony,XCDLED.brochure.html' },
  ];

  const frame = document.getElementById('page-frame');
  const buttons = Array.from(document.querySelectorAll('.nav button'));
  const HEARTBEAT_INTERVAL_MS = 2000;
  const PING_INTERVAL_MS = 3000;
  let launcherWatchdog = false;
  let heartbeatTimer = null;
  let pingTimer = null;

  function findPage(pathname) {
    return PAGES.find((p) => p.path === pathname) || PAGES[0];
  }

  function navigate(page, pushState) {
    if (pushState) {
      history.pushState({ path: page.path }, '', page.path);
    }
    frame.src = page.src;
    buttons.forEach((btn) => btn.classList.toggle('active', btn.dataset.path === page.path));
  }

  async function safeFetch(url, options = {}) {
    const response = await fetch(url, {
      cache: 'no-store',
      ...options,
    });
    if (!response.ok && response.status !== 204) {
      throw new Error(`Request failed: ${response.status}`);
    }
    return response;
  }

  async function setupWatchdog() {
    try {
      const status = await safeFetch('/__launcher/status').then((r) => r.json());
      launcherWatchdog = Boolean(status.watchdog);
      if (!launcherWatchdog) return;
    } catch {
      return;
    }

    heartbeatTimer = window.setInterval(() => {
      safeFetch('/__launcher/heartbeat', { method: 'POST', keepalive: true }).catch(() => {});
    }, HEARTBEAT_INTERVAL_MS);

    pingTimer = window.setInterval(async () => {
      try {
        await safeFetch('/__launcher/ping');
      } catch {
        window.clearInterval(heartbeatTimer);
        window.clearInterval(pingTimer);
        window.close();
      }
    }, PING_INTERVAL_MS);
  }

  // Load the page that matches the current URL on first visit
  if (window.location.pathname === '/') {
    const defaultPage = findPage('/Intel/Eventide');
    history.replaceState({ path: defaultPage.path }, '', defaultPage.path);
  }
  navigate(findPage(window.location.pathname), false);
  setupWatchdog();

  // Handle browser back / forward
  window.addEventListener('popstate', () => {
    navigate(findPage(window.location.pathname), false);
  });

  // Handle nav button clicks
  buttons.forEach((btn) => {
    btn.addEventListener('click', () => {
      const page = findPage(btn.dataset.path);
      if (page.path !== window.location.pathname) {
        navigate(page, true);
      }
    });
  });

  window.addEventListener('beforeunload', () => {
    if (!launcherWatchdog) return;
    try {
      navigator.sendBeacon('/__launcher/closed');
    } catch {}
  });
</script>
</body>
</html>
