title: NewGen
description: Dynamic showcase loader for premium Intel Eventide, Sony, and ASUS brochure experiences.

# GitHub Pages project site URL.
# actions/configure-pages will override baseurl automatically during CI builds.
baseurl: "/NewGen"
url: "https://cookiesmuch.github.io"

# Exclude development and server files from the static build output.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - Server/server.js
  - scripts/
  - package.json
  - package-lock.json
  - start-newgen.bat
  - start-newgen.ps1
  - NewGen.code-workspace
  - README.md
  - NAVIGATION.md
  - test-navigation.html
