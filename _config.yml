title: NewGen
description: Dynamic showcase loader for premium Intel Eventide, Sony, and ASUS brochure experiences.

# Serve from root base path.
baseurl: ""
url: "https://cookiesmuch.github.io"

# Exclude development and server files from the static build output.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - Server/
  - scripts/
  - package.json
  - package-lock.json
  - start-newgen.bat
  - start-newgen.ps1
  - NewGen.code-workspace
  - README.md
  - NAVIGATION.md
  - test-navigation.html
