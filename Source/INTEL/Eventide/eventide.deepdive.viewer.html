function stripBasePath(pathname, basePath) {
  if (!basePath) return pathname;
  if (pathname === basePath) return '/';
  if (pathname.startsWith(`${basePath}/`)) {
    return pathname.slice(basePath.length) || '/';
  }
  return pathname;
}

function withBasePath(pathname, basePath) {
  if (!basePath) return pathname;
  if (pathname === '/') return `${basePath}/`;
  return `${basePath}${pathname}`;
}

function toggleSection(id) {
  const body = document.getElementById(`body-${id}`);
  const icon = document.getElementById(`icon-${id}`);
  if (!body || !icon) {
    return;
  }

  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  icon.classList.toggle('open', !isOpen);
  icon.textContent = isOpen ? '▼' : '▲';
}

function detectAppBasePath(pathname) {
  const normalizedPath = pathname.replace(/\/+$/, '') || '/';
  const routePaths = Object.keys(DEEPDIVE_MAPPINGS);
  for (const routePath of routePaths) {
    const markerIndex = normalizedPath.indexOf(routePath);
    if (markerIndex > 0) {
      return normalizedPath.slice(0, markerIndex);
    }
    if (markerIndex === 0) {
      return '';
    }
  }
  const segments = normalizedPath.split('/').filter(Boolean);
  return segments.length ? `/${segments[0]}` : '';
}

async function loadDeepdive() {
  const container = document.getElementById('deepdive-container');
  const appBasePath = detectAppBasePath(window.location.pathname);

  // Prefer explicit route from query string for direct/raw deep-dive links.
  const urlParams = new URLSearchParams(window.location.search);
  let currentPath = urlParams.get('path') || null;

  // Fall back to parent/current pathname when no explicit route is provided.
  try {
    if (!currentPath) {
      if (window.parent && window.parent !== window && window.parent.location) {
        currentPath = window.parent.location.pathname;
      } else {
        currentPath = window.location.pathname;
      }
    }
  } catch (e) {
    // Cross-origin access blocked, fall back to current window path.
    currentPath = currentPath || window.location.pathname;
  }
  currentPath = stripBasePath(currentPath, appBasePath);

  const deepdiveSrc = DEEPDIVE_MAPPINGS[currentPath];

  if (!deepdiveSrc) {
    container.innerHTML = `
      <div class="error-message">
        <h1>404 Page Not Found</h1>
        <p>The requested deep dive section could not be found for path: <strong>${currentPath}</strong></p>
        <p style="margin-top: 16px;">
          <a href="${withBasePath('/Intel/Eventide', appBasePath)}" style="color: var(--intel-blue); text-decoration: none;">← Return to Overview</a>
        </p>
      </div>
    `;
    return;
  }

  try {
    // Load the deepdive content via fetch and inject it directly
    const response = await fetch(deepdiveSrc);
    if (!response.ok) {
      throw new Error(`Failed to fetch: ${response.status} ${response.statusText}`);
    }

    let htmlContent = await response.text();

    // Parse the HTML to extract styles and body content
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, 'text/html');

    // Extract and inject styles
    const styleNodes = Array.from(doc.querySelectorAll('style'));
    styleNodes.forEach((styleNode) => {
      const injectedStyle = document.createElement('style');
      injectedStyle.textContent = styleNode.textContent || '';
      document.head.appendChild(injectedStyle);
    });

    // Extract body content (or all content if no body tag)
    let bodyHtml;
    if (doc.body && doc.body.innerHTML) {
      bodyHtml = doc.body.innerHTML;
    } else {
      // If no body tag, get all non-style content
      bodyHtml = htmlContent.replace(/<style[\s\S]*?<\/style>/gi, '').trim();
    }

    // Fix relative image paths
    bodyHtml = bodyHtml
      .replaceAll('src="../Media/MustangOutline.svg"', 'src="Media/MustangOutline.svg"')
      .replaceAll('src="../Media/MustangLogo.svg"', 'src="Media/MustangLogo.svg"')
      .replaceAll('src="MustangOutline.svg"', 'src="Media/MustangOutline.svg"')
      .replaceAll('src="MustangLogo.svg"', 'src="Media/MustangLogo.svg"');

    container.innerHTML = bodyHtml;
  } catch (error) {
    console.error('Error loading deepdive:', error);
    container.innerHTML = `
      <div class="error-message">
        <h1>Error Loading Deep Dive</h1>
        <p>An error occurred while loading the deep dive content: ${error.message}</p>
        <p style="margin-top: 16px;">
          <a href="${withBasePath('/Intel/Eventide', appBasePath)}" style="color: var(--intel-blue); text-decoration: none;">← Return to Overview</a>
        </p>
      </div>
    `;
  }
}

function goBack() {
  const appBasePath = detectAppBasePath(window.location.pathname);
  // Navigate back to the brochure page
  if (window.parent && window.parent !== window && window.parent.navigateToPath) {
    // We're in an iframe, use parent's navigation to go back to brochure
    window.parent.navigateToPath('/Intel/Eventide', { source: 'return-to-main' });
  } else {
    // Direct navigation fallback
    window.location.href = withBasePath('/Intel/Eventide', appBasePath);
  }
}

// Load the deepdive content when the page loads
loadDeepdive();
